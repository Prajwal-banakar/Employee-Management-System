<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Delete All Employees</title>
    <meta charset="UTF-8"/>
</head>
<body>
<h2>Confirm Deletion of All Employees</h2>

<form th:action="@{/remove/all}" method="post" th:object="${confirmationForm}">
    <p>Are you sure you want to delete <strong>all employees</strong>?</p>

    <label>Type "Yes" to confirm:</label>
    <input type="text" th:field="*{confirmation}" placeholder="Yes or No" required/><br><br>

    <button type="submit">Confirm</button>
</form>

<p th:text="${successMessage}" style="color: green;"></p>
<p th:text="${infoMessage}" style="color: blue;"></p>

<a href="/">Back to Home</a>
</body>
</html>
