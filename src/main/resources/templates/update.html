<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Update Employee</title>
    <meta charset="UTF-8"/>
</head>
<body>
<h2>Update Employee</h2>

<form th:action="@{/update}" method="post" th:object="${employee}">
    <label>Employee ID:</label>
    <label>
        <input type="text" th:field="*{id}" required/>
    </label><br> <br>

    <label>Name:</label>
    <input type="text" th:field="*{name}" required/><br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required/><br><br>

    <label>Department:</label>
    <input type="text" th:field="*{department}" required/><br><br>

    <button type="submit">Update</button>
</form>

<p th:text="${successMessage}" style="color: green;"></p>
<p th:text="${errorMessage}" style="color: red;"></p>

<a href="/">Back to Home</a>
</body>
</html>
